<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; }
  .slide {
    width: 1920px;
    height: 1080px;
    position: relative;
    background: #1a1a2e;
    overflow: hidden;
  }

  .box-shadow-card {
    position: absolute;
    top: 200px;
    left: 200px;
    width: 500px;
    height: 300px;
    background: #16213e;
    border-radius: 16px;
    box-shadow: rgba(0, 0, 0, 0.5) 8px 16px 32px 0px;
  }

  .text-shadow-heading {
    position: absolute;
    top: 100px;
    left: 200px;
    font-size: 64px;
    font-family: Arial, sans-serif;
    color: #ffffff;
    text-shadow: rgba(0, 0, 0, 0.8) 3px 3px 6px;
  }

  .glow-box {
    position: absolute;
    top: 600px;
    left: 200px;
    width: 400px;
    height: 200px;
    background: #0f3460;
    border-radius: 12px;
    box-shadow: rgba(99, 102, 241, 0.6) 0px 0px 40px 0px;
  }

  .glow-text {
    position: absolute;
    top: 600px;
    left: 800px;
    font-size: 48px;
    font-family: Arial, sans-serif;
    color: #e94560;
    text-shadow: rgba(233, 69, 96, 0.8) 0px 0px 20px;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="text-shadow-heading">Shadow Demo</div>
    <div class="box-shadow-card"></div>
    <div class="glow-box"></div>
    <div class="glow-text">Glow Effect</div>
  </div>
</body>
</html>
