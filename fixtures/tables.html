<!DOCTYPE html>
<html>
<head>
<style>
  .slide {
    width: 1920px;
    height: 1080px;
    position: relative;
    background: #1a1a2e;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }
  table {
    border-collapse: collapse;
    position: absolute;
  }
  th, td {
    padding: 12px 20px;
    border: 1px solid #333;
    color: #e0e0e0;
    font-size: 20px;
  }
  th {
    background: #16213e;
    font-weight: bold;
    color: #ffffff;
  }
  /* Slide 1: Simple table */
  .slide:nth-child(1) table {
    left: 200px;
    top: 200px;
  }
  /* Slide 2: Styled with colspan */
  .slide:nth-child(2) table {
    left: 200px;
    top: 150px;
  }
  .slide:nth-child(2) .highlight {
    background: rgba(0, 150, 136, 0.3);
  }
</style>
</head>
<body>
  <!-- Slide 1: Simple data table -->
  <div class="slide">
    <table>
      <tr>
        <th>Feature</th>
        <th>Status</th>
        <th>Priority</th>
      </tr>
      <tr>
        <td>Text Decoration</td>
        <td>Complete</td>
        <td>High</td>
      </tr>
      <tr>
        <td>Hyperlinks</td>
        <td>Complete</td>
        <td>Medium</td>
      </tr>
      <tr>
        <td>Tables</td>
        <td>In Progress</td>
        <td>High</td>
      </tr>
    </table>
  </div>

  <!-- Slide 2: Table with colspan and styled cells -->
  <div class="slide">
    <table>
      <tr>
        <th colspan="3">Q1 Results</th>
      </tr>
      <tr>
        <td>Metric</td>
        <td>Target</td>
        <td>Actual</td>
      </tr>
      <tr>
        <td>Revenue</td>
        <td class="highlight">$1.2M</td>
        <td class="highlight">$1.5M</td>
      </tr>
      <tr>
        <td>Users</td>
        <td>10,000</td>
        <td>12,500</td>
      </tr>
    </table>
  </div>
</body>
</html>
