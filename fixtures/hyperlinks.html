<!DOCTYPE html>
<html>
<head>
<style>
  .slide {
    width: 1920px;
    height: 1080px;
    position: relative;
    background: #1a1a2e;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }
  .title {
    position: absolute;
    top: 100px;
    left: 160px;
    font-size: 64px;
    color: #ffffff;
  }
  .link {
    position: absolute;
    top: 300px;
    left: 160px;
    font-size: 36px;
  }
  .link a {
    color: #4fc3f7;
    text-decoration: underline;
  }
  .mixed-text {
    position: absolute;
    top: 450px;
    left: 160px;
    font-size: 32px;
    color: #e0e0e0;
  }
  .mixed-text a {
    color: #81c784;
    text-decoration: underline;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="title">Hyperlink Test</div>
  <div class="link"><a href="https://example.com">Visit Example.com</a></div>
  <div class="mixed-text">Check out <a href="https://github.com">GitHub</a> for code.</div>
</div>
</body>
</html>
